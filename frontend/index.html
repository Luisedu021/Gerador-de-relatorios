<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Relatórios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <img src="assets/Mega_jr.svg" alt="Vetor" />
      </nav>

      <div class="Ata-Reuniao">
        <h1>Ata de Reunião Inteligente</h1>
      </div>
    </header>

    <main class="container">
      <div class="card-header">
        <div class="logo-mid"></div>
        <button class="btn-amarelo">Gerar Resumo</button>
      </div>

      <div class="card-body">
        <div class="coluna-textos">
          <textarea
            class="caixa-texto"
            placeholder="Coloque os detalhes da ata"
          ></textarea>
          <textarea
            class="caixa-texto"
            placeholder="Coloque os pontos mais importantes"
          ></textarea>
        </div>

        <aside class="side-box">
          <textarea
            class="caixa-data-hora"
            placeholder="Coloque data e horário da ata"
          ></textarea>
        </aside>
      </div>
    </main>
    <section class="converter">
      <div class="converter-left"></div>
      <div class="converter-right">
        <button class="btn-amarelo-2">Clique aqui para baixar</button>
      </div>
    </section>
<footer class="mega-footer">
  <div class="footer-section location-block">
    <div class="location-icon">
      <img src="assets/map-pin.svg" alt="Localização" />
    </div>
    <div class="address-text">
      <p>Avenida Costa e Silva, S/N - Universidade Federal de Mato Grosso do Sul, Campus</p>
      <p>Cidade Universitária</p>
    </div>
  </div>

  <div class="footer-section logo-block">
    <div class="logo-inner">
      <img src="assets/Mega_jr.svg" alt="Mega Jr. Duck Logo" class="mega-logo" />
      <div class="logo-text-wrapper">
        

      </div>
    </div>
  </div>

  <div class="footer-section social-block">
    <div class="social-inner">
      <div class="us-block">
        <img src="assets/Group11.svg" alt="US Design" class="us-logo" />
      </div>
      <a href="#" target="_blank" class="social-icon instagram-icon">
        <img src="assets/instagram.svg" alt="Instagram" />
      </a>
      <a href="#" target="_blank" class="social-icon linkedin-icon">
        <img src="assets/linkedin.svg" alt="LinkedIn" />
      </a>
    </div>
  </div>
</footer>
  <script src="work.js"></script>
  </body>
</html>
  </body>
</html>
